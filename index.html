<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">


  <meta charset="UTF-8">
  <title> Deepak Link Hub</title>
  <style>
    :root {
      --bg-light: #f4f4f4;
      --bg-dark: #1e1e1e;
      --text-light: #333;
      --text-dark: #f4f4f4;
      --button-color: #0077b5;
      --button-hover: #005582;
    }
 body {
  font-family: 'Poppins', sans-serif;
}

   .profile-pic {
  width: 120px;
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
 

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 50px;
      text-align: center;
      color: var(--text-light);
      transition: background-color 0.5s, color 0.5s;
      overflow: hidden;
      position: relative;
      background-color: rgba(244, 244, 244, 0.9);
    }

    .dark-mode {
      background-color: rgba(30, 30, 30, 0.9);
      color: var(--text-dark);
    }

    .bg-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1461749280684-dccba630e2f6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      z-index: -2;
      filter: blur(2px) brightness(0.6);
      animation: bg-effect 5s infinite alternate;
    }

    .dark-mode .bg-image {
      filter: blur(3px) brightness(0.4);
    }

    @keyframes bg-effect {
      0% { filter: blur(2px) brightness(0.6) saturate(1); }
      100% { filter: blur(3px) brightness(0.8) saturate(1.2); }
    }

    .bg-text {
      position: absolute;
      font-size: 4em;
      opacity: 0.03;
      color: var(--text-light);
      z-index: -1;
      pointer-events: none;
      animation: float 10s infinite linear;
      text-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .dark-mode .bg-text {
      color: var(--text-dark);
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .bg-coder {
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .bg-developer {
      top: 20%;
      right: 10%;
      animation-delay: 5s;
    }

    .bg-ai {
      bottom: 20%;
      left: 20%;
      animation-delay: 10s;
    }

    .bg-tech {
      bottom: 10%;
      right: 20%;
      animation-delay: 15s;
    }

    @keyframes float {
      0% { transform: translateY(100vh) translateX(0) rotate(0deg); }
      25% { transform: translateY(50vh) translateX(50vw) rotate(90deg); }
      50% { transform: translateY(0) translateX(100vw) rotate(180deg); }
      75% { transform: translateY(-50vh) translateX(50vw) rotate(270deg); }
      100% { transform: translateY(-100vh) translateX(0) rotate(360deg); }
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2em;
      margin-bottom: 10px;
      color: yellow;
    }

    p.bio {
      font-size: 1em;
      margin-bottom: 30px;
      color: white;
    }

    .link-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px auto;
      padding: 12px 24px;
      background-color: var(--button-color);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      width: 240px;
      font-weight: bold;
      transition: transform 0.3s, background-color 0.3s;
    }

    .link-button:hover {
      background-color: var(--button-hover);
      transform: scale(1.05);
    }

    .toggle-btn {
      margin-top: 20px;
      padding: 8px 16px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="bg-image"></div>
  <div class="bg-text bg-coder">Coder</div>
  <div class="bg-text bg-developer">Developer</div>
  <div class="bg-text bg-ai">AI</div>
  <div class="bg-text bg-tech">Tech</div>


  <h1>Welcome to Deepak Link Hub 🚀</h1>
  <p class="bio">Tech enthusiast | coder | AI enthusiast</p>

  <a class="link-button" href="https://codeforces.com/profile/Deepak404nf">🏆 CodeForces</a>
  <a class="link-button" href="https://github.com/d33pAk1106">💻 GitHub</a>
  <a class="link-button" href="https://leetcode.com/u/d33pAk1106/">🧠 LeetCode</a>
  <a class="link-button" href="https://www.linkedin.com/in/deepak-raj-19708a339?utm_source=share_via&utm_content=profile&utm_medium=member_android">🔗 LinkedIn</a>
  <a class="link-button" href="https://www.facebook.com/share/1AxaPMuKX3/">📘 Facebook</a>
 

  <button class="toggle-btn" onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      const bgTexts = document.querySelectorAll('.bg-text');
      const bgImage = document.querySelector('.bg-image');
      const textDuration = isDark ? '5s' : '10s';
      const imageDuration = isDark ? '2.5s' : '5s';
      bgTexts.forEach(el => el.style.animationDuration = textDuration);
      if (bgImage) bgImage.style.animationDuration = imageDuration;
    }
  </script>
</body>
</html>
